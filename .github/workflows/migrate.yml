# Run Prisma migrations against the production database.
# Triggers: every push to main (including merges), or manual run.
# Requires GitHub secret: POSTGRES_URL_NON_POOLING (direct connection, port 5432).

name: Prisma migrate

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        run: npx prisma migrate deploy
