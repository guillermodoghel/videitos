# Run Prisma migrations against the production database.
# Runs automatically on every push to main, and can be triggered manually.
# Uses non-pooling URL only to avoid connection timeouts in CI.
# Requires GitHub secret: POSTGRES_URL_NON_POOLING (direct connection, port 5432; copy from Vercel/Supabase)

name: Prisma migrate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        run: npx prisma migrate deploy
